<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>チェキメーカー</title>
<style>
  :root{
    --ice:#B7D9F7; --mist:#F8FAFD; --glass:#DDE5EC; --navy:#1E2633;
    --silver:#C6CED8; --lavender:#CFC9F6; --reflect:#EAF4FF; --muted:#6b7888;
  }
  *{ box-sizing:border-box; }
  body{
    font-family:"Zen Kaku Gothic New","DM Sans",system-ui,-apple-system,sans-serif;
    background:var(--mist); color:var(--navy); margin:0; min-height:100dvh;
    display:grid; place-items:start center; padding:28px 18px;
  }
  .app{ width:min(900px,100%); }
  h1{ font-size:20px; font-weight:700; margin:0 0 4px; letter-spacing:.02em; }
  .lead{ font-size:12px; color:var(--muted); margin:0 0 20px; }
  .card{ background:#fff; border:1px solid var(--glass); border-radius:18px; padding:20px; }
  .row{ display:flex; gap:24px; flex-wrap:wrap; }
  .col{ flex:1 1 300px; }
  label{ font-size:12px; color:var(--muted); display:block; }
  input[type="file"], input[type="text"]{
    width:100%; margin-top:6px; padding:11px 12px; border-radius:12px;
    border:1px solid var(--glass); background:var(--reflect); color:var(--navy);
    font-family:inherit; font-size:13px;
  }
  .field{ margin-top:14px; }
  .accent{ display:flex; gap:8px; margin-top:8px; }
  .swatch{ width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--glass); }
  .swatch.sel{ box-shadow:0 0 0 2px var(--navy); }
  .btns{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
  button{
    font-family:inherit; font-size:13px; padding:10px 16px; border-radius:12px;
    border:1px solid var(--glass); cursor:pointer; transition:.15s; background:#fff; color:var(--navy);
  }
  button.primary{ background:var(--ice); border-color:var(--ice); color:#16324d; font-weight:700; }
  button:hover{ background:var(--reflect); }
  button.primary:hover{ filter:brightness(.98); }
  .tip{ font-size:11px; color:var(--muted); margin-top:10px; }
  .stage{ display:grid; place-items:center; margin-top:18px; }
  canvas{ max-width:100%; border-radius:12px; box-shadow:0 10px 30px rgba(30,38,51,.10); }
</style>
</head>
<body>
  <div class="app">
    <h1>チェキメーカー</h1>
    <p class="lead">画像とひとことを入れるだけ。静かな水色のチェキ風PNGにして保存できる。すべて端末内・通信なし。</p>

    <div class="card">
      <div class="row">
        <div class="col">
          <label>画像を選ぶ
            <input id="file" type="file" accept="image/*" />
          </label>
          <div class="field">
            <label>ひとこと（推しの名前・日付・会場など）
              <input id="caption" type="text" maxlength="64" placeholder="" />
            </label>
          </div>
          <div class="field">
            <label>アクセント</label>
            <div class="accent" id="accent">
              <div class="swatch sel" data-c="#9CC6EE" style="background:#B7D9F7" title="氷水色"></div>
              <div class="swatch" data-c="#B7AEE9" style="background:#CFC9F6" title="ラベンダー"></div>
              <div class="swatch" data-c="#AAB6C2" style="background:#C6CED8" title="シルバー"></div>
            </div>
          </div>
          <div class="btns">
            <button class="primary" id="render">チェキを作る</button>
            <button id="save">PNGで保存</button>
            <button id="print">印刷用に保存（大）</button>
            <button id="clear">リセット</button>
          </div>
          <div class="tip">画面 720×900px。「印刷用に保存（大）」は同じ見た目を 2160×2700px（小カードなら300dpi以上）で書き出します。フォントはOS既定。</div>
        </div>
      </div>
      <div class="stage"><canvas id="c" width="720" height="900" aria-label="チェキ出力"></canvas></div>
    </div>
  </div>

<script>
const W = 720, H = 900;
const PAD = 26, INNER = 30, CAP_H = 150, FRAME_R = 26, PHOTO_R = 14;
const COL = { back:"#EAF4FF", paper:"#FFFFFF", photoBg:"#EDF1F7", ink:"#1E2633", date:"#9aa6b4" };
let accentLine = "#9CC6EE";   // 罫線・点の色（濃いめのアクセント）
let img = null;

const screenCtx = document.querySelector("#c").getContext("2d");
let ctx = screenCtx;   // 印刷書き出し時だけ一時的に高解像度キャンバスへ差し替える
const el = {
  file: document.querySelector("#file"),
  cap: document.querySelector("#caption"),
  render: document.querySelector("#render"),
  save: document.querySelector("#save"),
  print: document.querySelector("#print"),
  clear: document.querySelector("#clear"),
  accent: document.querySelector("#accent"),
};

el.file.addEventListener("change", async (e) => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  img = await fileToImage(f);
  draw();
});
el.render.addEventListener("click", draw);
el.save.addEventListener("click", savePNG);
el.print.addEventListener("click", () => exportPrint(3));
el.clear.addEventListener("click", () => {
  img = null; el.file.value = ""; el.cap.value = ""; baseFrame();
});
el.cap.addEventListener("input", () => { if (img) draw(); });
el.accent.addEventListener("click", (e) => {
  const sw = e.target.closest(".swatch");
  if (!sw) return;
  [...el.accent.children].forEach((c) => c.classList.remove("sel"));
  sw.classList.add("sel");
  accentLine = sw.getAttribute("data-c");
  if (img) draw();
});

function draw() {
  baseFrame();
  if (img) placePhoto(img);
  drawCaption(el.cap.value || "");
  addGrain(0.028);
}

function baseFrame() {
  ctx.clearRect(0, 0, W, H);
  // 明るい霧の背景
  ctx.fillStyle = COL.back;
  ctx.fillRect(0, 0, W, H);

  // 白いチェキ紙（弱い影）
  ctx.save();
  ctx.shadowColor = "rgba(30,38,51,0.12)";
  ctx.shadowBlur = 28; ctx.shadowOffsetY = 12;
  roundRect(PAD, PAD, W - PAD * 2, H - PAD * 2, FRAME_R);
  ctx.fillStyle = COL.paper; ctx.fill();
  ctx.restore();

  // 画像エリア（下にひとこと用の余白を残す＝ポラロイドらしさ）
  const x = PAD + INNER, y = PAD + INNER;
  const w = W - (PAD + INNER) * 2;
  const h = H - (PAD + INNER) * 2 - CAP_H;
  roundRect(x, y, w, h, PHOTO_R);
  ctx.fillStyle = COL.photoBg; ctx.fill();
}

function placePhoto(image) {
  const x = PAD + INNER, y = PAD + INNER;
  const w = W - (PAD + INNER) * 2;
  const h = H - (PAD + INNER) * 2 - CAP_H;
  const r = Math.max(w / image.width, h / image.height);
  const dw = image.width * r, dh = image.height * r;
  const dx = x + (w - dw) / 2, dy = y + (h - dh) / 2;

  ctx.save();
  roundRect(x, y, w, h, PHOTO_R); ctx.clip();
  ctx.drawImage(image, dx, dy, dw, dh);
  // ごく薄い寒色トーン（水色の世界観に馴染ませる・弱め）
  ctx.fillStyle = "rgba(183,217,247,0.08)";
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

function drawCaption(text) {
  const x = PAD + INNER;
  const boxY = H - PAD - INNER - CAP_H;
  const w = W - (PAD + INNER) * 2;

  // 細い罫線＋小さなアクセント点
  ctx.strokeStyle = accentLine; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x, boxY + 10); ctx.lineTo(x + w, boxY + 10); ctx.stroke();
  ctx.fillStyle = accentLine;
  ctx.beginPath(); ctx.arc(x + 8, boxY + 10, 3.5, 0, Math.PI * 2); ctx.fill();

  // ひとこと
  ctx.fillStyle = COL.ink;
  ctx.font = '600 28px "Zen Kaku Gothic New", system-ui, sans-serif';
  ctx.textBaseline = "top";
  ctx.fillText((text || "").trim().slice(0, 32), x + 4, boxY + 30);

  // 日付（控えめ）
  ctx.font = '14px "Zen Kaku Gothic New", system-ui, sans-serif';
  ctx.fillStyle = COL.date;
  ctx.fillText(new Date().toISOString().slice(0, 10), x + 4, boxY + 78);
}

function addGrain(strength) {
  // キャンバスの実ピクセル寸法で処理（印刷用の高解像度キャンバスにも対応）
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const d = ctx.getImageData(0, 0, cw, ch);
  const a = d.data;
  for (let i = 0; i < a.length; i += 4) {
    const n = (Math.random() * 2 - 1) * 255 * strength;
    a[i] += n; a[i + 1] += n; a[i + 2] += n;
  }
  ctx.putImageData(d, 0, 0);
}

function savePNG() {
  const a = document.createElement("a");
  a.download = "cheki.png";
  a.href = document.querySelector("#c").toDataURL("image/png");
  a.click();
}

// 印刷用：同じ絵をそのまま scale 倍の高解像度で書き出す（見た目は変えない）
function exportPrint(scale = 3) {
  const oc = document.createElement("canvas");
  oc.width = W * scale; oc.height = H * scale;
  const prev = ctx;
  ctx = oc.getContext("2d");   // 一時的に描画先を高解像度キャンバスへ
  ctx.scale(scale, scale);     // W×H 座標のまま scale 倍で描かれる
  draw();
  const url = oc.toDataURL("image/png");
  ctx = prev;                  // 画面用に戻す
  draw();                      // 画面を元の表示に再描画
  const a = document.createElement("a");
  a.download = "cheki_print.png";
  a.href = url;
  a.click();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function fileToImage(file) {
  return new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = URL.createObjectURL(file);
  });
}

baseFrame();
</script>
</body>
</html>
